<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="JetBrains Mono, Menlo, monospace" font-size="14">
  <rect width="1200" height="760" fill="#16161e"/>

  <!-- header -->
  <text x="16" y="22" fill="#565f89">lazyharness · <tspan fill="#c0caf5">dev-flow</tspan> · creando harness con IA · <tspan fill="#e0af68">sin guardar</tspan></text>

  <!-- main editor panel -->
  <rect x="12" y="34" width="840" height="470" fill="#1a1b26" stroke="#3b4261" stroke-width="1.5" rx="4"/>
  <text x="26" y="30" fill="#565f89">┤ code-reviewer.xml · <tspan fill="#9ece6a">editando</tspan> ├</text>

  <text x="30" y="66" fill="#565f89">&lt;role&gt;</text>
  <text x="50" y="90" fill="#c0caf5">Sos el code reviewer del equipo. Revisás planes del <tspan fill="#f7768e" font-weight="bold">@arquitecto</tspan></text>
  <text x="50" y="112" fill="#c0caf5">y features implementadas. Tu foco: correctitud, simplicidad y</text>
  <text x="50" y="134" fill="#c0caf5">seguridad. Tus observaciones son sugerencias, no bloqueos.</text>
  <text x="30" y="158" fill="#565f89">&lt;/role&gt;</text>
  <text x="30" y="194" fill="#565f89">&lt;output&gt;</text>
  <text x="50" y="218" fill="#c0caf5">Devolvé una lista priorizada: [crítico] [mejora] [nit].</text>
  <text x="50" y="240" fill="#c0caf5">Registrá un informe corto en tareas.json al terminar.<tspan fill="#c0caf5">█</tspan></text>
  <text x="30" y="264" fill="#565f89">&lt;/output&gt;</text>

  <!-- question box from the skill -->
  <rect x="80" y="300" width="700" height="120" fill="#1f2335" stroke="#bb9af7" stroke-width="1.5" rx="4"/>
  <text x="94" y="296" fill="#bb9af7">┤ La IA pregunta ├</text>
  <text x="98" y="330" fill="#c0caf5">¿Tu code reviewer debería poder marcar un plan como "bloqueado"</text>
  <text x="98" y="352" fill="#c0caf5">o solo emitir sugerencias que el arquitecto decide aceptar?</text>
  <text x="98" y="386" fill="#c0caf5"><tspan fill="#bb9af7">1</tspan> solo sugiere   <tspan fill="#bb9af7">2</tspan> puede bloquear   <tspan fill="#bb9af7">3</tspan> bloquea solo en seguridad</text>

  <!-- AI chat bar -->
  <rect x="12" y="518" width="840" height="86" fill="#1a1b26" stroke="#7aa2f7" stroke-width="1.5" rx="4"/>
  <text x="26" y="514" fill="#7aa2f7">┤ Hacelo con IA ├</text>
  <text x="30" y="546" fill="#565f89">vos ▸ <tspan fill="#c0caf5">quiero un flujo de desarrollo con un arquitecto líder, un reviewer</tspan></text>
  <text x="78" y="566" fill="#c0caf5">exigente y dos devs, uno de back y otro de front</text>
  <text x="30" y="592" fill="#bb9af7">ia  ▸ <tspan fill="#c0caf5">Perfecto. Estoy poblando los roles a la derecha; respondé la pregunta ↑</tspan></text>

  <!-- right panel: prompts populating -->
  <rect x="864" y="34" width="324" height="570" fill="#1a1b26" stroke="#3b4261" stroke-width="1.5" rx="4"/>
  <text x="878" y="30" fill="#565f89">┤ Prompts ├</text>

  <text x="882" y="66" fill="#f7768e">● arquitecto</text>
  <text x="1110" y="66" fill="#9ece6a">✓ listo</text>

  <rect x="868" y="80" width="316" height="24" fill="#283457"/>
  <text x="882" y="98" fill="#e0af68">● code-reviewer</text>
  <text x="1086" y="98" fill="#e0af68">⟳ generando</text>

  <text x="882" y="130" fill="#9ece6a">● dev-backend</text>
  <text x="1086" y="130" fill="#565f89">○ pendiente</text>
  <text x="882" y="162" fill="#7dcfff">● dev-frontend</text>
  <text x="1086" y="162" fill="#565f89">○ pendiente</text>
  <text x="882" y="194" fill="#565f89">+ workflow.md</text>
  <text x="1086" y="194" fill="#565f89">○ pendiente</text>

  <text x="882" y="240" fill="#565f89">navegá con jk para revisar</text>
  <text x="882" y="258" fill="#565f89">y editar cada prompt antes</text>
  <text x="882" y="276" fill="#565f89">de guardar.</text>

  <!-- keybar -->
  <rect x="0" y="722" width="1200" height="38" fill="#1a1b26"/>
  <text x="16" y="746" fill="#565f89"><tspan fill="#7aa2f7">ctrl+a</tspan>: activar/ocultar IA  <tspan fill="#7aa2f7">1-3</tspan>: responder  <tspan fill="#7aa2f7">tab</tspan>: panel  <tspan fill="#7aa2f7">ctrl+s</tspan>: guardar (commit)  <tspan fill="#7aa2f7">esc</tspan>: salir sin guardar</text>
</svg>
